name: sqleasy
description: >-
  A dialect-aware SQL builder for Postgres, MySQL, SQL Server and SQLite. Fluent, zero-dependency, and not an ORM: it emits the SQL and its bound parameters.
version: 4.1.0

homepage: https://github.com/deebee-tech/sqleasy-dart
repository: https://github.com/deebee-tech/sqleasy-dart
issue_tracker: https://github.com/deebee-tech/sqleasy-dart/issues

topics:
  - sql
  - database
  - query-builder
  - postgres
  - mysql

# Deliberately a PURE DART package — no `flutter:` dependency. It has no I/O, no platform channels
# and no dart:io/dart:html, so it runs on Flutter mobile, desktop and web, and on plain Dart servers.
# Adding a Flutter SDK dependency would cost the Dart-native classification on pub.dev and buy nothing.
environment:
  sdk: ^3.6.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
