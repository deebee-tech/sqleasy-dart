name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - run: dart analyze --fatal-infos
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart run tool/fetch_goldens.dart --verify
      - run: dart run tool/verify_embed.dart

      # The Dart VM — what Flutter mobile and desktop compile to.
      - run: dart test

      # dart2js — what Flutter WEB compiles to. This is NOT redundant with the run above, and it is
      # not optional.
      #
      # The two platforms disagree about numbers. On dart2js every number is a JavaScript double, so
      # `5.0 is int` is TRUE (it is false on the VM) and `(5.0).toString()` is "5" (it is "5.0" on
      # the VM). `is int` even compiles to roughly `Math.floor(x) === x`, which makes
      # `double.infinity is int` true on the web. A port that gets this wrong emits DIFFERENT SQL on
      # Flutter web than on Flutter mobile, silently, and a single-platform test run cannot see it.
      #
      # This job has already caught one such bug in lib/src/values/sql_value.dart. Do not remove it.
      - run: dart test -p chrome

      - run: dart run example/sqleasy_example.dart

  # Verifies this package still agrees, byte-for-byte, with the TypeScript implementation it was
  # ported from — on both platforms. See goldens/README.md.
  conformance:
    name: Golden corpus conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart run tool/fetch_goldens.dart --verify
      - run: dart run tool/verify_embed.dart
      - run: dart test test/conformance
      - run: dart test test/conformance -p chrome
